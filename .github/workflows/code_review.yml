name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Get PR info
        id: pr_info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "REPO=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "OWNER=${{ github.repository_owner }}" >> $GITHUB_OUTPUT

      - name: Run Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          import os
          from src.github_client import GitHubClient
          from src.pipeline import create_review_pipeline

          owner = os.environ.get('OWNER')
          repo = os.environ.get('REPO')
          pr_number = int(os.environ.get('PR_NUMBER'))

          client = GitHubClient(owner, repo, os.environ.get('GITHUB_TOKEN'))
          diff = client.get_pr_diff(pr_number)

          pipeline = create_review_pipeline()
          result = pipeline.invoke({'diff': diff})

          summary = result.get('summary', '')
          if summary:
              client.post_summary_comment(pr_number, summary)

          print('Review completed')
          "
