name: AI 代码审查

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: 检出 PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -e .

      - name: 运行代码审查
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Use base repo info (correct for both forked and non-forked PRs)
          OWNER: ${{ github.event.pull_request.base.repo.owner.login }}
          REPO: ${{ github.event.pull_request.base.repo.name }}
        run: |
          python -c "
          import os
          import traceback
          from src.github_client import GitHubClient
          from src.pipeline import create_review_pipeline

          owner = os.environ.get('OWNER')
          repo = os.environ.get('REPO')
          pr_number = int(os.environ.get('PR_NUMBER'))

          # Debug: Check environment
          print(f'OWNER: {owner}')
          print(f'REPO: {repo}')
          print(f'PR_NUMBER: {pr_number}')
          print(f'GITHUB_TOKEN set: {bool(os.environ.get(\"GITHUB_TOKEN\"))}')
          print(f'DEEPSEEK_API_KEY set: {bool(os.environ.get(\"DEEPSEEK_API_KEY\"))}')

          print(f'Fetching PR diff: {owner}/{repo} PR #{pr_number}')

          try:
              client = GitHubClient(os.environ.get('GITHUB_TOKEN'))
              diff = client.get_pr_diff(owner, repo, pr_number)
              print(f'Diff length: {len(diff)} bytes')
              if not diff:
                  print('WARNING: Diff is empty!')
              else:
                  print(f'Diff preview (first 200 chars): {diff[:200]}')

              print('Running pipeline...')
              pipeline = create_review_pipeline()
              result = pipeline.invoke({'diff': diff})

              summary = result.get('summary', '')
              final_issues = result.get('final_issues', [])
              print(f'Pipeline result: {len(final_issues)} issues found')

              if summary:
                  print('Posting summary comment...')
                  client.create_issue_comment(owner, repo, pr_number, summary)
                  print('Comment posted successfully')
              else:
                  print('No summary to post (no issues found or summary empty)')

          except Exception as e:
              print(f'ERROR: {type(e).__name__}: {e}')
              traceback.print_exc()
              raise

          print('审查完成')
          "
